<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="color-scheme" content="light dark">
  <title>Not Found - NopeID</title>
  <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png">
  <link rel="shortcut icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f7f8fb;
      --text: #111827;
      --muted: #5b6472;
      --border: #e3e7ef;
      --primary: #2563eb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090d14;
        --bg-soft: #101722;
        --text: #f8fafc;
        --muted: #a3adbc;
        --border: rgba(255, 255, 255, 0.1);
        --primary: #60a5fa;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    .site-header {
      position: absolute;
      inset: 0 0 auto;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .nav,
    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      min-height: 64px;
      align-items: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: inherit;
      text-decoration: none;
      font-weight: 750;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      overflow: hidden;
      border-radius: 9px;
    }

    .brand-icon img {
      display: block;
      width: 100%;
      height: 100%;
    }

    main {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      padding: 136px 0 72px;
      background:
        radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.12), transparent 42%),
        linear-gradient(180deg, var(--bg-soft), var(--bg));
      text-align: center;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(44px, 8vw, 76px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    p {
      margin-top: 18px;
      color: var(--muted);
      font-size: 18px;
    }

    .button {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
      padding: 0 22px;
      border-radius: 8px;
      color: #ffffff;
      background: #2563eb;
      text-decoration: none;
      font-size: 14px;
      font-weight: 750;
    }

    .button:hover {
      background: #1d4ed8;
    }

    .site-footer {
      border-top: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
      font-size: 13px;
    }

    .footer-inner {
      padding: 24px 0;
    }

    .site-footer p {
      margin: 0;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="/" aria-label="NopeID home">
        <span class="brand-icon" aria-hidden="true">
          <img src="/tray-lightmode.png" alt="">
        </span>
        <span>NopeID</span>
      </a>
    </nav>
  </header>

  <main>
    <div class="wrap">
      <h1>Not found</h1>
      <p>The page you requested does not exist.</p>
      <a class="button" href="/">Back to NopeID</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <p>&copy; 2026 NopeID. All rights reserved. No tracking cookies.</p>
    </div>
  </footer>
</body>

</html>
